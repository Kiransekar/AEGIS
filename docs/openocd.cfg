#===============================================================================
# AEGIS-RV OpenOCD Configuration
# Interface: FTDI-based JTAG
# Target: AEGIS-RV RT Core (RV32IMACF)
#===============================================================================

interface ftdi
ftdi_vid_pid 0x0403 0x6010
ftdi_layout_init 0x0518 0x057b
transport select jtag
reset_config srst_only
adapter_khz 5000

set _CHIPNAME aegis_rv
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x10000001
target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu
$_CHIPNAME.cpu configure -work-area-phys 0x80000000 -work-area-size 0x1000

init
reset halt
